name: Shell checks

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: shell-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run static shell checks
        run: sh scripts/check.sh
